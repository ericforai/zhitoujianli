<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">管理员功能测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <h1 class="text-3xl font-bold text-center mb-8">🎯 管理员功能测试页面</h1>
        
        <!-- 管理员信息 -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">📋 管理员账户信息</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <p><strong>用户ID：</strong><code th:text="${testUserId}">68dba0e3d9c27ebb0d93aa42</code></p>
                    <p><strong>是否为管理员：</strong>
                        <span th:if="${isAdmin}" class="text-green-600 font-medium">✅ 是</span>
                        <span th:unless="${isAdmin}" class="text-red-600 font-medium">❌ 否</span>
                    </p>
                </div>
                <div th:if="${adminUser}">
                    <p><strong>管理员类型：</strong><span th:text="${adminUser.adminType.displayName}">超级管理员</span></p>
                    <p><strong>状态：</strong>
                        <span th:if="${adminUser.isActive}" class="text-green-600">活跃</span>
                        <span th:unless="${adminUser.isActive}" class="text-gray-600">非活跃</span>
                    </p>
                </div>
            </div>
        </div>

        <!-- 权限详情 -->
        <div th:if="${adminUser}" class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">🔑 管理员权限详情</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">
                <div th:each="permission : ${adminUser.permissions}" 
                     th:if="${permission.value}" 
                     class="bg-green-50 border border-green-200 rounded px-3 py-2">
                    <span class="text-green-800 text-sm" th:text="${permission.key}">权限名称</span>
                </div>
            </div>
            <p class="mt-4 text-gray-600">
                总权限数：<span th:text="${adminUser.permissions.size()}">0</span> 项
            </p>
        </div>

        <!-- 功能测试区 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- API测试 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">🔍 API接口测试</h2>
                <div class="space-y-3">
                    <button onclick="testAPI('/api/admin/test-admin', 'GET')" 
                            class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">
                        测试管理员状态
                    </button>
                    <button onclick="testInitAdmin()" 
                            class="w-full bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700">
                        初始化超级管理员
                    </button>
                    <button onclick="testAPI('/api/admin/dashboard', 'GET')" 
                            class="w-full bg-purple-600 text-white py-2 px-4 rounded hover:bg-purple-700">
                        测试仪表板API
                    </button>
                </div>
            </div>

            <!-- 页面导航 -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">🎯 页面导航</h2>
                <div class="space-y-3">
                    <a href="/admin-page" 
                       class="block w-full bg-indigo-600 text-white py-2 px-4 rounded hover:bg-indigo-700 text-center">
                        管理员仪表板
                    </a>
                    <a href="http://localhost:3001/admin" target="_blank"
                       class="block w-full bg-cyan-600 text-white py-2 px-4 rounded hover:bg-cyan-700 text-center">
                        React管理界面
                    </a>
                    <a href="http://localhost:3001" 
                       class="block w-full bg-gray-600 text-white py-2 px-4 rounded hover:bg-gray-700 text-center">
                        返回首页
                    </a>
                </div>
            </div>
        </div>

        <!-- 测试结果显示 -->
        <div id="test-results" class="mt-6 bg-white rounded-lg shadow-md p-6 hidden">
            <h2 class="text-xl font-semibold mb-4">📊 测试结果</h2>
            <div id="result-content" class="bg-gray-50 p-4 rounded border">
                <!-- 结果将在这里显示 -->
            </div>
        </div>
    </div>

    <script>
        async function testAPI(url, method = 'GET', body = null) {
            const resultDiv = document.getElementById('test-results');
            const contentDiv = document.getElementById('result-content');
            
            resultDiv.classList.remove('hidden');
            contentDiv.innerHTML = '<p class="text-blue-600">正在测试 ' + url + '...</p>';
            
            try {
                const options = {
                    method: method,
                    headers: {'Content-Type': 'application/json'}
                };
                
                if (body) {
                    options.body = JSON.stringify(body);
                }
                
                const response = await fetch(url, options);
                let data;
                
                try {
                    data = await response.json();
                } catch (e) {
                    data = { error: '响应不是有效的JSON', status: response.status };
                }
                
                let statusClass = response.ok ? 'text-green-600' : 'text-red-600';
                contentDiv.innerHTML = `
                    <div class="mb-2">
                        <span class="font-medium">请求:</span> ${method} ${url}
                    </div>
                    <div class="mb-2">
                        <span class="font-medium">状态:</span> 
                        <span class="${statusClass}">${response.status} ${response.statusText}</span>
                    </div>
                    <div class="mb-2">
                        <span class="font-medium">响应:</span>
                    </div>
                    <pre class="bg-white p-3 rounded border text-xs overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>
                `;
                
            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="text-red-600">
                        <p class="font-medium">请求失败:</p>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testInitAdmin() {
            await testAPI('/api/admin/init-super-admin', 'POST', {
                userId: '68dba0e3d9c27ebb0d93aa42',
                remarks: '通过测试页面初始化'
            });
        }
        
        // 页面加载时自动测试管理员状态
        window.onload = function() {
            testAPI('/api/admin/test-admin', 'GET');
        };
    </script>
</body>
</html>
