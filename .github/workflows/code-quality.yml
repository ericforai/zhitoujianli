name: 代码质量检查

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 前端代码质量检查
  frontend-quality:
    name: 前端代码质量检查
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: 安装前端依赖
      run: |
        cd frontend
        npm ci || true
      continue-on-error: true

    - name: TypeScript类型检查
      run: |
        cd frontend
        npm run type-check || true
      continue-on-error: true

    - name: ESLint检查
      run: |
        cd frontend
        npm run lint:check
      continue-on-error: true

    - name: Prettier格式检查
      run: |
        cd frontend
        npm run format:check
      continue-on-error: true

    - name: 运行测试
      run: |
        cd frontend
        npm test -- --watchAll=false --coverage || true
      continue-on-error: true

    - name: 上传覆盖率报告
      uses: codecov/codecov-action@v3
      continue-on-error: true
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # 后端代码质量检查
  backend-quality:
    name: 后端代码质量检查
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 缓存Maven依赖
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('backend/get_jobs/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Checkstyle检查
      run: |
        cd backend/get_jobs
        mvn checkstyle:check
      continue-on-error: true

    - name: SpotBugs检查
      run: |
        cd backend/get_jobs
        mvn spotbugs:check
      continue-on-error: true

    - name: PMD检查
      run: |
        cd backend/get_jobs
        mvn pmd:check
      continue-on-error: true

    - name: 运行测试并生成覆盖率报告
      run: |
        cd backend/get_jobs
        mvn clean test jacoco:report || true
      continue-on-error: true

    - name: 生成测试报告
      uses: dorny/test-reporter@v1
      if: success() || failure()
      continue-on-error: true
      with:
        name: Maven Tests
        path: backend/get_jobs/target/surefire-reports/*.xml
        reporter: java-junit

    - name: JaCoCo覆盖率检查
      run: |
        cd backend/get_jobs
        mvn jacoco:check
      continue-on-error: true

    - name: 上传JaCoCo覆盖率报告
      uses: actions/upload-artifact@v4
      if: always()
      continue-on-error: true
      with:
        name: jacoco-coverage-report
        path: backend/get_jobs/target/site/jacoco/index.html
        retention-days: 30

    - name: 上传JaCoCo覆盖率到Codecov
      uses: codecov/codecov-action@v3
      if: always()
      continue-on-error: true
      with:
        file: ./backend/get_jobs/target/site/jacoco/jacoco.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

  # 安全扫描
  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 前端安全扫描
      run: |
        cd frontend
        npm audit --audit-level=critical || true
      continue-on-error: true

    - name: 设置Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 后端安全扫描
      run: |
        cd backend/get_jobs
        mvn org.owasp:dependency-check-maven:check || true
      continue-on-error: true

  # 构建检查
  build-check:
    name: 构建检查
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 构建前端
      run: |
        cd frontend
        npm ci
        npm run build || true
      continue-on-error: true

    - name: 构建Astro博客
      run: |
        cd blog/zhitoujianli-blog
        npm ci
        # CI 环境下偶发缺少 html-escaper（被 @astrolib/seo 以动态方式导入）
        # 注意：Vite 解析器的 importer 在 repo 根目录的 node_modules 下，因此需要在 repo 根目录也确保安装。
        npm install html-escaper@3.0.3 --no-save --no-audit
        cd ../..
        npm install html-escaper@3.0.3 --no-save --no-audit
        cd blog/zhitoujianli-blog
        npm run build || true
      continue-on-error: true

    - name: 生成和合并Sitemap
      run: |
        python3 scripts/generate-sitemap-main.py
        python3 scripts/merge-sitemaps.py || true
      continue-on-error: true

    - name: 设置Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 构建后端
      run: |
        cd backend/get_jobs
        mvn clean compile package -DskipTests || true
      continue-on-error: true

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      continue-on-error: true
      with:
        name: build-artifacts
        path: |
          frontend/build/
          backend/get_jobs/target/*.jar
