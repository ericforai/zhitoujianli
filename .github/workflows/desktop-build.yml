# 智投简历桌面端（Tauri）：前端构建 + Rust 检查 + 发布级打包
name: Desktop (Tauri)

on:
  push:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-build.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-build.yml'

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Cargo check
        run: cd src-tauri && cargo check --all-targets

      # GitHub 默认 CI=true 会导致 tauri-cli 传入非法的 --ci 参数，此处显式关闭
      - name: Tauri release bundle
        run: npm run tauri build
        env:
          CI: false

      - name: Upload bundle artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundle-macos
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload bundle artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundle-windows
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
